<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Validation Result</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            margin-top: 2rem;
        }
        .card {
            border: none;
        }
        .card-header {
            background-color: #1e1e1e;
        }
        .badge {
            font-weight: normal;
        }
        .badge.bg-success {
            background-color: #28a745 !important;
        }
        .badge.bg-warning {
            background-color: #ffc107 !important;
            color: #212529;
        }
        .badge.bg-danger {
            background-color: #dc3545 !important;
        }
        .list-group {
            margin-top: 1rem;
        }
        .list-group-item {
            background-color: #1e1e1e;
            border: none;
            color: #e0e0e0;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Password Validation Result</h3>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <p><strong>Username:</strong> <span th:text="${username}"></span></p>
                        <p><strong>Password:</strong> <span th:text="${password}"></span></p>
                    </div>
                    <div class="mb-3">
                        <p><strong>Score:</strong> <span th:text="${report.score}"></span>/100</p>
                    </div>
                    <div class="mb-3">
                        <span th:attr="class='badge ' + (${report.strengthLevel} == 'STRONG' ? 'bg-success' : (${report.strengthLevel} == 'MODERATE' ? 'bg-warning' : 'bg-danger'))"
                              th:text="${report.strengthLevel}"></span>
                    </div>
                    <div th:if="${not #lists.isEmpty(report.suggestions)}">
                        <h5>Suggestions for improvement:</h5>
                        <ul class="list-group">
                            <li th:each="suggestion : ${report.suggestions}" class="list-group-item" th:text="${suggestion}"></li>
                        </ul>
                    </div>
                    <div th:unless="${not #lists.isEmpty(report.suggestions)}">
                        <p class="text-success">No suggestions! Your password is strong.</p>
                    </div>
                    <a href="/" class="btn btn-primary mt-3">Validate Another Password</a>
                </div>
                <div class="card-footer text-muted">
                    <div class="footer">
                        Password strength validation using rule-based scoring.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Bootstrap JS (optional, for button interactions) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
