<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Strength Validator</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            margin-top: 2rem;
        }
        .form-control, .btn {
            border-radius: 0.25rem;
        }
        .form-label {
            color: #e0e0e0;
        }
        .alert {
            margin-top: 1rem;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Password Strength Validator</h3>
                </div>
                <div class="card-body">
                    <!-- Display error message if any -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/validate}" th:object="${passwordRequestDto}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Enter your username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Validate Password</button>
                    </form>
                </div>
                <div class="card-footer text-muted">
                    <div class="footer">
                        Enter your username and password to check the strength.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Bootstrap JS (optional, for form interactions) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
